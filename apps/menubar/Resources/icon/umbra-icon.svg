<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- squircle background: deep shadow -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17171c"/>
      <stop offset="0.55" stop-color="#0c0c10"/>
      <stop offset="1" stop-color="#060608"/>
    </linearGradient>
    <!-- the occluding body (umbra / moon) -->
    <radialGradient id="moon" cx="0.42" cy="0.36" r="0.85">
      <stop offset="0" stop-color="#141419"/>
      <stop offset="0.7" stop-color="#070709"/>
      <stop offset="1" stop-color="#020203"/>
    </radialGradient>
    <!-- corona glow -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff6e01" stop-opacity="0"/>
      <stop offset="0.62" stop-color="#ff6e01" stop-opacity="0"/>
      <stop offset="0.80" stop-color="#ff7d1a" stop-opacity="0.55"/>
      <stop offset="0.92" stop-color="#ff6e01" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ff6e01" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffa24d"/>
      <stop offset="0.5" stop-color="#ff6e01"/>
      <stop offset="1" stop-color="#d94e00"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8a2e" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ff6e01" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- squircle plate (Big Sur grid: 824 centered, r≈180) -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bg)"/>
  <!-- faint top sheen for depth -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="#ffffff" opacity="0.03"/>

  <!-- corona glow -->
  <circle cx="512" cy="512" r="300" fill="url(#glow)"/>
  <!-- corona ring (the eclipse) -->
  <circle cx="512" cy="512" r="212" fill="none" stroke="url(#ring)" stroke-width="26"/>
  <!-- soft outer flare -->
  <circle cx="512" cy="512" r="212" fill="none" stroke="#ff6e01" stroke-width="54" opacity="0.12"/>
  <!-- occluding body -->
  <circle cx="512" cy="512" r="188" fill="url(#moon)"/>
  <!-- top rim-light on the body -->
  <path d="M 355 442 A 188 188 0 0 1 669 442" fill="none" stroke="url(#rim)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
</svg>
